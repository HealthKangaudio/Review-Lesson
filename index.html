<!DOCTYPE html>
<html lang="ko">
<head>
  <meta property="og:title" content="수업 요약 노트" />
<meta property="og:description" content="수업 내용을 기록하고 피드백을 확인하세요." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://healthkangaudio.github.io/Review-Lesson/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수업 요약 노트</title>
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="레슨 복습 노트" />
<meta name="description" content="수업 내용을 기록하고 피드백을 확인하는 레슨 복습 노트 앱" />

<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #374151;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #16a34a;
      --danger: #ef4444;
      --warn: #f59e0b;
      --blue: #38bdf8;
      --violet: #a78bfa;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
    }

    .wrap {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    h1, h2, h3, p { margin-top: 0; }
    strong { color: #fff; }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
    }

    .hero,
    .grid-2,
    .grid-3,
    .grid-4 {
      display: grid;
      gap: 16px;
    }

    .hero { grid-template-columns: 1.15fr 0.85fr; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }

    .hidden { display: none !important; }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.5;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      transition: 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #4b5563;
    }

    .btn-primary {
      background: var(--accent);
      color: #052e16;
      border: none;
    }

    .btn-primary:hover { background: var(--accent-2); }

    .btn-danger {
      background: var(--danger);
      color: white;
      border: none;
    }

    .btn-secondary {
      background: #334155;
      color: white;
    }

    .btn-blue {
      background: #0f766e;
      color: white;
      border: none;
    }

    .btn-violet {
      background: #6d28d9;
      color: white;
      border: none;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar > * {
      flex: 1 1 160px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      color: #bbf7d0;
      font-size: 12px;
      margin-right: 8px;
      margin-bottom: 8px;
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .muted { color: var(--muted); }

    .note-item,
    .student-card,
    .stat-card,
    .comment-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: rgba(31, 41, 55, 0.7);
    }

    .note-item { margin-bottom: 12px; }

    .note-item h4,
    .student-card h4,
    .stat-card h4,
    .comment-box h4 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .note-meta,
    .student-meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .status-good { color: #86efac; }
    .status-warn { color: #fcd34d; }
    .status-miss { color: #fca5a5; }
    .status-blue { color: #7dd3fc; }
    .status-violet { color: #c4b5fd; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e5e7eb;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .empty {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat-card .stat-value {
      font-size: 30px;
      font-weight: bold;
      margin-top: 10px;
    }

    .student-card.submitted { border-color: rgba(34, 197, 94, 0.45); }
.student-card.missing { border-color: rgba(239, 68, 68, 0.45); }
.student-card.pending { border-color: rgba(245, 158, 11, 0.45); }

.notice-banner {
  margin-bottom: 16px;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid rgba(245, 158, 11, 0.35);
  background: rgba(245, 158, 11, 0.12);
  color: #fde68a;
}

    .small { font-size: 12px; }

    .note-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
.teacher-note-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(15, 23, 42, 0.72);
  padding: 16px;
  margin-bottom: 16px;
}

.teacher-note-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.18);
}

.teacher-note-title {
  margin: 0;
  font-size: 18px;
  font-weight: 700;
}

.teacher-note-submeta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.teacher-note-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.note-badge {
  display: inline-flex;
  align-items: center;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: #1e293b;
  border: 1px solid #334155;
  color: #e5e7eb;
}

.teacher-note-sections {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.teacher-note-block {
  background: rgba(31, 41, 55, 0.72);
  border: 1px solid rgba(148, 163, 184, 0.14);
  border-radius: 14px;
  padding: 12px 14px;
}

.teacher-note-block h5 {
  margin: 0 0 8px;
  font-size: 13px;
  color: #cbd5e1;
}

.teacher-note-block p {
  margin: 0;
  line-height: 1.6;
  color: #f8fafc;
}

.teacher-file-box {
  margin-top: 2px;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(56, 189, 248, 0.08);
  border: 1px solid rgba(56, 189, 248, 0.18);
}

.teacher-file-box a {
  color: #7dd3fc;
  text-decoration: none;
}

.teacher-file-box a:hover {
  text-decoration: underline;
}

.teacher-comment-box {
  margin-top: 4px;
  padding: 14px;
  border-radius: 14px;
  background: rgba(109, 40, 217, 0.10);
  border: 1px solid rgba(167, 139, 250, 0.28);
}

.teacher-comment-box .comment-title {
  font-size: 14px;
  font-weight: 700;
  color: #ddd6fe;
  margin-bottom: 6px;
}

.teacher-comment-box .comment-help {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
}

.teacher-comment-box textarea {
  min-height: 110px;
  background: rgba(17, 24, 39, 0.9);
}

.teacher-comment-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.teacher-comment-footer .small {
  flex: 1 1 220px;
}

.teacher-comment-footer button {
  width: auto;
  min-width: 120px;
}
    .teacher-comment {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(109, 40, 217, 0.12);
      border: 1px solid rgba(167, 139, 250, 0.3);
    }

    .teacher-comment textarea {
      min-height: 90px;
    }

    @media (max-width: 980px) {
  .hero,
  .grid-2,
  .grid-3,
  .grid-4,
  .summary-row,
  .note-footer {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 768px) {
  body {
    font-size: 15px;
  }

  .wrap {
    padding: 14px 12px 32px;
  }

  .topbar {
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
  }

  .topbar h1 {
    font-size: 24px;
    line-height: 1.25;
    margin-bottom: 6px;
  }

  .topbar .muted {
    font-size: 14px;
    line-height: 1.5;
  }

  .card {
    padding: 14px;
    border-radius: 16px;
    margin-bottom: 12px;
  }

  .section-title {
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 10px;
  }

  .section-title h2 {
    font-size: 20px;
    line-height: 1.3;
    margin: 0;
  }

  label {
    font-size: 14px;
    margin-bottom: 8px;
  }

  input,
  select,
  textarea,
  button {
    font-size: 16px;
    min-height: 48px;
    padding: 12px 14px;
  }

  textarea {
    min-height: 140px;
    line-height: 1.6;
  }

  .toolbar {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }

  .toolbar > * {
    flex: 1 1 auto;
    width: 100%;
  }

  .badge,
  .pill,
  .note-badge {
    font-size: 12px;
  }

  .notice-banner {
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.5;
  }

  .note-item,
  .teacher-note-card {
    padding: 14px;
    border-radius: 16px;
  }

  .teacher-note-header {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    padding-bottom: 10px;
    margin-bottom: 10px;
  }

  .teacher-note-title {
    font-size: 17px;
    line-height: 1.35;
  }

  .teacher-note-submeta {
    font-size: 13px;
    line-height: 1.5;
  }

  .teacher-note-badges {
    gap: 6px;
  }

  .teacher-note-block {
    padding: 12px;
    border-radius: 12px;
  }

  .teacher-note-block h5 {
    font-size: 13px;
    margin-bottom: 6px;
  }

  .teacher-note-block p {
    font-size: 14px;
    line-height: 1.65;
  }

  .teacher-file-box {
    padding: 10px 12px;
    line-height: 1.5;
  }

  .teacher-comment-box {
    padding: 12px;
    border-radius: 12px;
  }

  .teacher-comment-box textarea {
    min-height: 140px;
  }

  .teacher-comment-footer {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }

  .teacher-comment-footer button {
    width: 100%;
    min-width: 0;
  }

  #logoutBtn,
  #loadDashboardBtn,
  #saveNoteBtn,
  #resetFormBtn,
  #refreshMyNotesBtn {
    width: 100%;
  }

  #teacherStudentFilter {
    width: 100%;
  }

  #myNotesList .toolbar {
    margin-top: 10px;
  }
}

@media (max-width: 480px) {
  .wrap {
    padding: 12px 10px 24px;
  }

  .card {
    padding: 12px;
    border-radius: 14px;
  }

  .topbar h1 {
    font-size: 22px;
  }

  .section-title h2 {
    font-size: 18px;
  }

  input,
  select,
  textarea,
  button {
    padding: 12px;
    border-radius: 10px;
  }

  textarea {
    min-height: 150px;
  }

  .teacher-note-card,
  .note-item {
    padding: 12px;
  }

  .teacher-note-title {
    font-size: 16px;
  }
}
.teacher-note-summary {
  background: linear-gradient(180deg, rgba(34, 197, 94, 0.14), rgba(34, 197, 94, 0.08));
  border: 1px solid rgba(34, 197, 94, 0.35);
  border-radius: 18px;
  padding: 18px 20px;
  margin-bottom: 14px;
}

.teacher-note-summary h5 {
  margin: 0 0 8px;
  font-size: 14px;
  color: #bbf7d0;
  letter-spacing: 0.02em;
}

.teacher-note-summary p {
  margin: 0;
  font-size: 17px;
  line-height: 1.75;
  font-weight: 600;
  color: #f0fdf4;
}

/* 모바일에서 더 강조 */
@media (max-width: 768px) {
  .teacher-note-summary {
    padding: 18px 16px;
    border-radius: 16px;
  }

  .teacher-note-summary h5 {
    font-size: 13px;
    margin-bottom: 6px;
  }

  .teacher-note-summary p {
    font-size: 19px;   /* 🔥 핵심 */
    line-height: 1.8;
    font-weight: 700;
  }
}
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 16px;
}

.pagination button {
  width: auto;
  min-width: 44px;
  padding: 10px 12px;
}

.pagination .page-info {
  color: var(--muted);
  font-size: 14px;
  padding: 0 6px;
}

.pagination .active-page {
  background: var(--accent);
  color: #052e16;
  border: none;
}

@media (max-width: 768px) {
  .pagination {
    gap: 6px;
  }

  .pagination button {
    min-width: 40px;
    padding: 10px;
  }
}
.install-banner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  margin-bottom: 16px;
  border-radius: 16px;
  background: rgba(56, 189, 248, 0.10);
  border: 1px solid rgba(56, 189, 248, 0.22);
}

.install-banner-text {
  flex: 1 1 auto;
  min-width: 0;
}

.install-banner-text strong {
  display: block;
  margin-bottom: 4px;
}

.install-banner-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.install-banner-actions button {
  width: auto;
  min-width: 100px;
}

@media (max-width: 768px) {
  .install-banner {
    flex-direction: column;
    align-items: stretch;
    padding: 12px 14px;
  }

  .install-banner-actions {
    width: 100%;
    flex-direction: column;
    align-items: stretch;
  }

  .install-banner-actions button {
    width: 100%;
    min-width: 0;
  }
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div id="installBanner" class="install-banner hidden">
  <div class="install-banner-text">
    <strong>앱처럼 설치해서 사용해보세요.</strong>
    <div class="small">홈 화면에 추가하면 더 편하게 열 수 있어요.</div>
  </div>
  <div class="install-banner-actions">
    <button id="installAppBtn" class="btn-primary hidden" type="button">앱 설치</button>
    <button id="iosGuideBtn" class="btn-secondary hidden" type="button">아이폰 설치 방법</button>
    <button id="dismissInstallBannerBtn" class="btn-secondary" type="button">닫기</button>
  </div>
</div>
      <div>
        <h1>수업 요약 노트</h1>
        <p class="muted">학생은 수업 내용을 정리하고, 선생님은 학생들 제출 현황을 확인하고 피드백을 작성할 수 있습니다.</p>
      </div>
      <div class="toolbar">
  <button id="logoutBtn" class="btn-secondary hidden">로그아웃</button>
</div>
    </div>

    <section id="authSection" class="hero">
      <div class="card">
        <h2>로그인 / 회원가입</h2>
        <div class="grid-2">
          <div>
            <label for="email">이메일</label>
            <input id="email" type="email" placeholder="example@email.com" />
          </div>
          <div>
            <label for="password">비밀번호</label>
            <input id="password" type="password" placeholder="비밀번호 입력" />
          </div>
        </div>
        <div style="margin-top:12px;">
          <label for="name">이름</label>
          <input id="name" type="text" placeholder="홍길동" />
        </div>
        <div class="grid-2" style="margin-top:14px;">
          <button id="signupBtn" class="btn-primary">회원가입</button>
          <button id="loginBtn" class="btn-secondary">로그인</button>
        </div>
        
      </div>

    </section>

    <section id="studentSection" class="hidden">
      <div style="margin-bottom:12px;">
  <button id="enablePushBtn" class="btn-blue">
    피드백 알림 받기
  </button>
</div>
  <div id="studentNoticeBanner" class="notice-banner hidden"></div>
      <div class="card">
        <div class="section-title">
          <h2>학생 복습 노트 작성</h2>
          <span class="badge">student</span>
        </div>
        <input id="weekNumber" type="hidden" />
        <div class="grid-2">
          <div>
            <label for="lessonDate">수업 날짜</label>
            <input id="lessonDate" type="date" />
          </div>
          <div>
            <label for="understanding">이해도</label>
            <select id="understanding">
              <option value="1">1 - 거의 모르겠음</option>
              <option value="2">2</option>
              <option value="3" selected>3 - 보통</option>
              <option value="4">4</option>
              <option value="5">5 - 잘 이해함</option>
            </select>
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="summary">오늘 수업 요약</label>
          <textarea id="summary" placeholder=""></textarea>
        </div>

        <div style="margin-top:12px;">
  <label for="questions">헷갈리는 점 / 질문</label>
  <textarea id="questions" placeholder=""></textarea>
</div>

        <div style="margin-top:12px;">
  <label for="homework">과제</label>
  <textarea id="homework" placeholder=""></textarea>
</div>

<div style="margin-top:12px;">
  <label for="homeworkFile">과제 파일 첨부</label>
  <input id="homeworkFile" type="file" />
  <div id="homeworkFileStatus" class="small muted" style="margin-top:8px;">첨부 파일 없음</div>
</div>

        <div class="toolbar" style="margin-top:14px;">
          <button id="saveNoteBtn" class="btn-primary">노트 저장</button>
          <button id="resetFormBtn" class="btn-secondary">입력 초기화</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">
          <h2>내가 작성한 노트</h2>
          <button id="refreshMyNotesBtn" class="btn-secondary">새로고침</button>
        </div>
        <div id="myNotesList"></div>
      </div>
    </section>

    <section id="teacherSection" class="hidden">
      <div class="card">
        <div class="section-title">
          <h2>선생님용 관리 화면</h2>
          <span class="badge">teacher</span>
        </div>
        <div class="toolbar">
          <div>
            <label for="teacherStudentFilter">학생 선택</label>
            <select id="teacherStudentFilter">
              <option value="">전체 학생</option>
            </select>
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="loadDashboardBtn" class="btn-primary">불러오기</button>
          </div>
        </div>
      </div>

    function calculateWeekNumberFromDate(dateString) {
      const APP_START_DATE = '2026-03-01';
      const start = new Date(APP_START_DATE);
      const target = new Date(dateString);
      if (Number.isNaN(start.getTime()) || Number.isNaN(target.getTime())) return 1;
      const diffDays = Math.floor((target - start) / (1000 * 60 * 60 * 24));
      const week = Math.floor(diffDays / 7) + 1;
      return Math.max(1, Math.min(16, week));
    }

    function syncWeekNumberFromLessonDate() {
      weekNumberEl.value = String(calculateWeekNumberFromDate(lessonDateEl.value));
    }
function normalizeDateString(dateString = '') {

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;')
        .replaceAll('\n', '<br>');
    }

    function formatFileSize(bytes = 0) {
  if (!bytes) return '-';
  const units = ['B', 'KB', 'MB', 'GB'];
  let size = bytes;
  let unitIndex = 0;

  while (size >= 1024 && unitIndex < units.length - 1) {
    size /= 1024;
    unitIndex += 1;
  }

  return `${size.toFixed(size >= 10 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
}

async function uploadHomeworkFile(userId, weekNumber, file) {
  const safeName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
  const fileRef = ref(storage, `homeworkFiles/${userId}/${weekNumber}/${safeName}`);

  const snapshot = await uploadBytes(fileRef, file, {
    contentType: file.type || 'application/octet-stream'
  });

  const downloadURL = await getDownloadURL(snapshot.ref);

  return {
    name: file.name,
    type: file.type || '',
    size: file.size || 0,
    path: snapshot.metadata.fullPath,
    url: downloadURL
  };
}

    function average(numbers) {
      if (!numbers.length) return 0;
      return numbers.reduce((sum, n) => sum + n, 0) / numbers.length;
    }

    async function loadTeacherStudentOptions() {
  if (!auth.currentUser || !currentUserProfile || currentUserProfile.role !== 'teacher') return;

  const previousValue = teacherStudentFilterEl.value;

  try {
    const snapshot = await getDocs(query(collection(db, 'notes'), orderBy('weekNumber', 'desc')));

    const notes = [];
    snapshot.forEach((docSnap) => {
      notes.push({ id: docSnap.id, ...docSnap.data() });
    });

    const studentMap = new Map();

    notes.forEach((note) => {
      if (!note.userId) return;

      if (!studentMap.has(note.userId)) {
        studentMap.set(note.userId, {
          id: note.userId,
          name: note.studentName || note.studentEmail || '이름 없음'
        });
      }
    });

    const students = Array.from(studentMap.values()).sort((a, b) =>
      (a.name || '').localeCompare(b.name || '', 'ko')
    );

    teacherStudentFilterEl.innerHTML = '<option value="">전체 학생</option>';

    students.forEach((student) => {
      const option = document.createElement('option');
      option.value = student.id;
      option.textContent = student.name;
      teacherStudentFilterEl.appendChild(option);
    });

    const stillExists = students.some((student) => student.id === previousValue);
    teacherStudentFilterEl.value = stillExists ? previousValue : '';
  } catch (error) {
    console.error('학생 선택 목록 로드 실패:', error);
  }
}

async function loadAllNotesForTeacher() {
  if (!auth.currentUser || !currentUserProfile || currentUserProfile.role !== 'teacher') return;

  const selectedStudentId = teacherStudentFilterEl.value;

  teacherNotesList.innerHTML = '<div class="empty">불러오는 중...</div>';
  teacherPagination.classList.add('hidden');
  teacherPagination.innerHTML = '';

  try {
    const snapshot = await getDocs(
      query(collection(db, 'notes'), orderBy('weekNumber', 'desc'))
    );

    const notes = [];
    snapshot.forEach((docSnap) => {
      notes.push({ id: docSnap.id, ...docSnap.data() });
    });

    const filteredNotes = selectedStudentId
      ? notes.filter((note) => note.userId === selectedStudentId)
      : notes;

    filteredNotes.sort((a, b) => {
      if ((b.weekNumber || 0) !== (a.weekNumber || 0)) {
        return (b.weekNumber || 0) - (a.weekNumber || 0);
      }
      return String(b.lessonDate || '').localeCompare(String(a.lessonDate || ''));
    });

    const totalPages = Math.max(1, Math.ceil(filteredNotes.length / TEACHER_NOTES_PER_PAGE));

    if (teacherCurrentPage > totalPages) {
      teacherCurrentPage = totalPages;
    }

    const startIndex = (teacherCurrentPage - 1) * TEACHER_NOTES_PER_PAGE;
    const endIndex = startIndex + TEACHER_NOTES_PER_PAGE;
    const pagedNotes = filteredNotes.slice(startIndex, endIndex);

    const items = pagedNotes.map((note) => `
      <div class="teacher-note-card">

            <span class="note-badge">이해도 ${note.understanding || '-'}/5</span>

          <p>${escapeHtml(note.summary || '-')}</p>
        </div>

        <div class="teacher-note-sections">
          <div class="teacher-note-block">
            <h5>헷갈리는 점 / 질문</h5>
            <p>${escapeHtml(note.questions || '-')}</p>
          </div>

          <div class="teacher-note-block">
            <h5>과제 / 복습</h5>
            <p>${escapeHtml(note.homework || '-')}</p>
          </div>

          ${note.homeworkFile?.url ? `
            <div class="teacher-file-box">
              <strong>첨부 파일</strong><br>
              <a href="${note.homeworkFile.url}" target="_blank" rel="noopener noreferrer">
                ${escapeHtml(note.homeworkFile.name || '파일 열기')}
              </a>
              <span class="small muted">(${formatFileSize(note.homeworkFile.size || 0)})</span>
            </div>
          ` : ''}
        </div>

        <div class="teacher-comment-box">
          <div class="comment-title">선생님 피드백</div>
          <div class="comment-help">여기에 작성한 내용은 학생 화면에도 그대로 표시됩니다.</div>

          <textarea data-comment-id="${note.id}" placeholder="피드백을 입력하세요.">${note.teacherComment || ''}</textarea>

          <div class="teacher-comment-footer">
            <div class="small muted">
              ${note.teacherCommentAuthor
                ? `마지막 작성: ${escapeHtml(note.teacherCommentAuthor)}`
                : '아직 코멘트 없음'}
            </div>
            <button class="btn-violet" data-save-comment-id="${note.id}">코멘트 저장</button>
          </div>
        </div>
      </div>
    `);

    teacherNotesList.innerHTML = items.length
      ? items.join('')
      : '<div class="empty">조건에 맞는 노트가 없습니다.</div>';

    teacherNotesList.querySelectorAll('[data-save-comment-id]').forEach((button) => {
      button.addEventListener('click', async (event) => {
        const noteId = event.currentTarget.dataset.saveCommentId;
        const textarea = teacherNotesList.querySelector(`[data-comment-id="${noteId}"]`);
        await saveTeacherComment(noteId, textarea?.value || '');
      });
    });

    if (filteredNotes.length > 0) {
      teacherPagination.classList.remove('hidden');

      const prevDisabled = teacherCurrentPage === 1 ? 'disabled' : '';
      const nextDisabled = teacherCurrentPage === totalPages ? 'disabled' : '';

      teacherPagination.innerHTML = `
        <button class="btn-secondary" data-page-action="prev" ${prevDisabled}>이전</button>
        <span class="page-info">${teacherCurrentPage} / ${totalPages}</span>
        <button class="btn-secondary" data-page-action="next" ${nextDisabled}>다음</button>
      `;

      teacherPagination.querySelector('[data-page-action="prev"]')?.addEventListener('click', async () => {
        if (teacherCurrentPage > 1) {
          teacherCurrentPage -= 1;
          await loadAllNotesForTeacher();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      teacherPagination.querySelector('[data-page-action="next"]')?.addEventListener('click', async () => {
        if (teacherCurrentPage < totalPages) {
          teacherCurrentPage += 1;
          await loadAllNotesForTeacher();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }
  } catch (error) {
    console.error(error);
    teacherNotesList.innerHTML = `<div class="empty">불러오기 실패: ${escapeHtml(error.message)}</div>`;
    teacherPagination.classList.add('hidden');
    teacherPagination.innerHTML = '';
  }
}

    async function setView(profile) {
  authSection.classList.add('hidden');
  logoutBtn.classList.remove('hidden');

  studentSection.classList.add('hidden');
  teacherSection.classList.remove('hidden');

  await loadTeacherStudentOptions();
  await loadAllNotesForTeacher();

  } else {
    teacherSection.classList.add('hidden');
    studentSection.classList.remove('hidden');
    setStudentNotice('');
    loadMyNotes();
  }
}

    function setLoggedOutView() {
      authSection.classList.remove('hidden');
      studentSection.classList.add('hidden');
      teacherSection.classList.add('hidden');
      logoutBtn.classList.add('hidden');
      currentUserProfile = null;

      if (!user) {
        setLoggedOutView();
        return;

      try {
        const profile = await getUserProfile(user.uid);

          showMessage('사용자 프로필을 찾지 못했습니다.');
          await signOut(auth);
          return;
        }
        currentUserProfile = profile;
        await setView(profile);
      } catch (error) {
        console.error(error);
        showMessage(`사용자 정보 로드 실패: ${error.message}`);
      }
    });
